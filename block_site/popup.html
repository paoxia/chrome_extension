<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网站屏蔽工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>网站屏蔽工具</h1>
    
    <!-- 当前网站信息 -->
    <div class="current-site-section">
      <h2>当前网站</h2>
      <div id="currentSite" class="current-site"></div>
      <div class="button-group">
        <button id="blockCurrentBtn" class="block-btn">屏蔽当前网站</button>
        <button id="unblockCurrentBtn" class="unblock-btn" style="display: none;">移除屏蔽</button>
      </div>
    </div>
    
    <!-- 已屏蔽网站列表 -->
    <div class="blocked-sites-section">
      <h2>已屏蔽网站</h2>
      <div id="blockedSitesList" class="blocked-sites-list"></div>
      <div id="noSitesMsg" class="no-sites-msg">暂无屏蔽网站</div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
