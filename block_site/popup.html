<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网站屏蔽工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">🛡️</div>
        <h1>网站屏蔽</h1>
      </div>
    </div>
    
    <div class="section-card">
      <div class="section-title">当前网站</div>
      <div id="currentSite" class="current-site"></div>
      <button id="blockCurrentBtn" class="primary-btn">屏蔽当前网站</button>
      <button id="unblockCurrentBtn" class="secondary-btn" style="display: none;">移除屏蔽</button>
    </div>
    
    <div class="section-card">
      <div class="section-title">已屏蔽网站</div>
      <div id="blockedSitesList" class="blocked-sites-list"></div>
      <div id="noSitesMsg" class="no-sites-msg">暂无屏蔽网站</div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
