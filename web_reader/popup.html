<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>网页内容总结器</title>
  <style>
    body {
      width: 400px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    h1 {
      font-size: 18px;
      margin-top: 0;
      color: #333;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-bottom: 10px;
    }
    button:hover {
      background-color: #45a049;
    }
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    .test-btn {
      background-color: #2196F3;
    }
    .test-btn:hover {
      background-color: #0b7dda;
    }
    #result {
      margin-top: 15px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>
  <h1>网页内容总结器</h1>
  <button id="testBtn" class="test-btn">测试Ollama连接</button>
  <button id="summarizeBtn">总结当前网页</button>
  <div id="status"></div>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
